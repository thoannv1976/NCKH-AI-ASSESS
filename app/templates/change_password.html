{% extends "base.html" %}
{% block title %}Đổi mật khẩu{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-8">
  <div class="bg-white rounded-xl shadow p-8">
    <h1 class="text-lg font-bold">Đổi mật khẩu</h1>
    <p class="text-sm text-slate-500 mt-1">{{ user.ho_ten or user.email }}</p>

    {% if ok %}
    <div class="mt-4 bg-emerald-50 border border-emerald-200 text-emerald-700 rounded-lg p-3 text-sm">Đã đổi mật khẩu thành công.</div>
    {% endif %}
    {% if error %}
    <div class="mt-4 bg-red-50 border border-red-200 text-red-700 rounded-lg p-3 text-sm">{{ error }}</div>
    {% endif %}

    <form method="post" action="/change-password" class="mt-5 space-y-4">
      <div>
        <label class="block text-sm font-medium">Mật khẩu hiện tại</label>
        <input name="current" type="password" required class="mt-1 w-full border rounded-lg px-3 py-2">
      </div>
      <div>
        <label class="block text-sm font-medium">Mật khẩu mới (tối thiểu 6 ký tự)</label>
        <input name="new_password" type="password" required minlength="6" class="mt-1 w-full border rounded-lg px-3 py-2">
      </div>
      <div>
        <label class="block text-sm font-medium">Xác nhận mật khẩu mới</label>
        <input name="confirm" type="password" required minlength="6" class="mt-1 w-full border rounded-lg px-3 py-2">
      </div>
      <button class="w-full bg-orange-600 hover:bg-orange-700 text-white rounded-lg py-2.5 font-semibold">Đổi mật khẩu</button>
    </form>
  </div>
</div>
{% endblock %}
